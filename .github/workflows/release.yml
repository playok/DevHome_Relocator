name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item target/release/devhome-relocator.exe release/
          Copy-Item README.md release/
          Copy-Item LICENSE release/
          Compress-Archive -Path release/* -DestinationPath DevHome_Relocator_${{ steps.version.outputs.VERSION }}_windows_x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DevHome Relocator ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            DevHome_Relocator_${{ steps.version.outputs.VERSION }}_windows_x64.zip
            target/release/devhome-relocator.exe
